services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - novel-net


  novelgen:
    build: .
    container_name: NovelGen
    depends_on:
      - ollama

    volumes:
      - .:/app
      - ./outputs:/app/outputs
      - ./manuscripts:/app/manuscripts

    environment:
      - PYTHONPATH=/app
      - OLLAMA_HOST={$OLLAMA_HOST:-http://ollama:11434}
      - OLLAMA_MODEL={$OLLAMA_MODEL:-llama3}

    networks:
      - novel-net

    command: python src/main.py

# Allow python app to talk to ollama
networks:
  novel-net:
    driver: bridge

# Persist ollama data so it doesnt have to be redownloaded or rebuilt
volumes:
  ollama_data: